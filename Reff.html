<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Kalkulator Refund – RUMUS REFUND</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      margin: 0;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 32px 28px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      color: #f1f5f9;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(to right, #c084fc, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .rumus-box {
      background: rgba(0, 0, 0, 0.25);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 24px;
      font-size: 0.95rem;
      border-left: 4px solid #a78bfa;
      color: #cbd5e1;
    }

    .rumus-box span {
      font-weight: 600;
      color: #e2e8f0;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 6px;
      color: #94a3b8;
      letter-spacing: 0.3px;
    }

    input, select {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 14px;
      font-size: 1rem;
      color: #f8fafc;
      outline: none;
      transition: all 0.2s ease;
      appearance: none;
      -webkit-appearance: none;
    }

    input::placeholder {
      color: #64748b;
    }

    input:focus, select:focus {
      border-color: #a78bfa;
      box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.25);
      background: rgba(255, 255, 255, 0.1);
    }

    select {
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%2394a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>');
      background-repeat: no-repeat;
      background-position: right 16px center;
      background-size: 18px;
      padding-right: 44px;
    }

    .btn-hit {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #8b5cf6, #6366f1);
      border: none;
      border-radius: 14px;
      font-size: 1.1rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: all 0.2s ease;
      margin-top: 8px;
      box-shadow: 0 10px 20px -8px rgba(99, 102, 241, 0.4);
    }

    .btn-hit:hover {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      transform: translateY(-1px);
      box-shadow: 0 15px 25px -8px rgba(99, 102, 241, 0.6);
    }

    .hasil-container {
      margin-top: 28px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 18px;
      padding: 20px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .label-hasil {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #94a3b8;
      margin-bottom: 8px;
    }

    .nilai-refund {
      font-size: 2.4rem;
      font-weight: 700;
      color: #facc15;
      word-break: break-word;
    }

    .detail-kecil {
      margin-top: 10px;
      font-size: 0.85rem;
      color: #94a3b8;
    }

    .contoh-box {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 12px;
      margin-top: 16px;
      font-size: 0.8rem;
      color: #cbd5e1;
      text-align: left;
    }

    .contoh-box strong {
      color: #e2e8f0;
    }

    hr {
      border: 0.5px solid rgba(255, 255, 255, 0.1);
      margin: 20px 0 12px;
    }

    @media (max-width: 400px) {
      .card {
        padding: 24px 18px;
      }
      .header h1 {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>𝗥𝗨𝗠𝗨𝗦 𝗥𝗘𝗙𝗙𝗨𝗡𝗗</h1>
    </div>

    <div class="rumus-box">
      <span>Rumus:</span> Harga Beli × Sisa Durasi ÷ Durasi Order × Service Fee
    </div>

    <div class="form-group">
      <label for="hargaBeli">💰 Harga Beli (Rp)</label>
      <input type="number" id="hargaBeli" placeholder="Contoh: 22000" min="0" step="any" inputmode="decimal">
    </div>

    <div class="form-group">
      <label for="sisaDurasi">⏳ Sisa Durasi</label>
      <input type="number" id="sisaDurasi" placeholder="Contoh: 42" min="0" step="any" inputmode="decimal">
    </div>

    <div class="form-group">
      <label for="durasiOrder">📅 Durasi Order</label>
      <input type="number" id="durasiOrder" placeholder="Contoh: 60" min="1" step="any" inputmode="decimal">
    </div>

    <div class="form-group">
      <label for="serviceFee">⚙️ Service Fee</label>
      <select id="serviceFee">
        <option value="0.8">0.8 – Pemakaian di bawah 1 minggu</option>
        <option value="0.7" selected>0.7 – Belum pernah klaim garansi</option>
        <option value="0.6">0.6 – Garansi 1 kali klaim</option>
        <option value="0.5">0.5 – Garansi 2 kali klaim</option>
        <option value="0.4">0.4 – Garansi 3 kali klaim</option>
      </select>
    </div>

    <button class="btn-hit" onclick="hitungRefund()">🔢 Hitung Refund</button>

    <div class="hasil-container" id="hasilBox" style="display: none;">
      <div class="label-hasil">Estimasi Refund</div>
      <div class="nilai-refund" id="nilaiRefund">Rp0</div>
      <div class="detail-kecil" id="detailPerhitungan"></div>
    </div>

    <hr>
    <div class="contoh-box">
      <strong>📋 Contoh perhitungan:</strong><br>
      Harga 22.000 × Sisa 42 ÷ Durasi 60 × 0.7 = <strong>10.780</strong>
    </div>
    <div style="text-align: center; margin-top: 12px; font-size: 0.75rem; color: #64748b;">
      Kalkulator Refund • hitung pakai ini
    </div>
  </div>

  <script>
    function hitungRefund() {
      const hargaBeli = parseFloat(document.getElementById('hargaBeli').value);
      const sisaDurasi = parseFloat(document.getElementById('sisaDurasi').value);
      const durasiOrder = parseFloat(document.getElementById('durasiOrder').value);
      const serviceFee = parseFloat(document.getElementById('serviceFee').value);

      const hasilBox = document.getElementById('hasilBox');
      const nilaiRefund = document.getElementById('nilaiRefund');
      const detailPerhitungan = document.getElementById('detailPerhitungan');

      // Validasi input
      if (isNaN(hargaBeli) || isNaN(sisaDurasi) || isNaN(durasiOrder) || durasiOrder === 0) {
        alert('Mohon isi semua angka dengan benar. Durasi Order tidak boleh 0.');
        hasilBox.style.display = 'none';
        return;
      }

      if (hargaBeli < 0 || sisaDurasi < 0 || durasiOrder <= 0) {
        alert('Nilai tidak boleh negatif dan durasi order harus lebih dari 0.');
        hasilBox.style.display = 'none';
        return;
      }

      // Perhitungan sesuai rumus: harga beli × sisa durasi ÷ durasi order × service fee
      const hasil = (hargaBeli * sisaDurasi / durasiOrder) * serviceFee;
      const hasilBulat = Math.round(hasil); // bulatkan ke integer agar rapi

      // Tampilkan hasil
      nilaiRefund.textContent = 'Rp' + hasilBulat.toLocaleString('id-ID');
      detailPerhitungan.innerHTML = `
        ${hargaBeli.toLocaleString('id-ID')} × ${sisaDurasi} ÷ ${durasiOrder} × ${serviceFee} 
        = <strong>${hasilBulat.toLocaleString('id-ID')}</strong>
      `;
      hasilBox.style.display = 'block';
    }

    // Memungkinkan tekan Enter untuk menghitung
    const inputs = document.querySelectorAll('input');
    inputs.forEach(input => {
      input.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          hitungRefund();
        }
      });
    });
  </script>
</body>
</html>
